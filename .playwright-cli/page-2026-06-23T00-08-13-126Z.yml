  - main [ref=e26]:
    - generic [ref=e27]:
      - generic [ref=e28]:
        - heading "Especialidades Reumatológicas — Artricenter" [level=1] [ref=e29]
        - heading "Enfermedades Reumáticas" [level=2] [ref=e30]
        - generic [ref=e38]:
          - paragraph [ref=e39]: Las enfermedades reumáticas son la segunda causa de consulta médica en hospitales, además de que aportan más del 50% de las causas de invalidez total o parcial y son la segunda causa de ausentismo y pérdida laboral.
          - paragraph [ref=e40]: Son aquellas que suelen afectar al aparato locomotor, es decir, articulaciones, tendones, ligamentos, músculos y huesos; sin embargo, algunas de ellas también pueden ocasionar daños en otros órganos.
          - paragraph [ref=e41]: "Algunos de los síntomas más comunes que ocasionan estas enfermedades son: dolor, inflamación articular, rigidez, fatiga y trastornos del sueño."
          - paragraph [ref=e42]:
            - text: En
            - strong [ref=e43]: Artricenter
            - text: "nos especializamos en el tratamiento de tres de las principales enfermedades reumáticas: Osteoartrosis, Artritis reumatoide y Fibromialgia."
      - generic [ref=e50]:
        - generic [ref=e51]:
          - heading "Osteoartrosis" [level=2] [ref=e52]
          - generic [ref=e59]:
            - paragraph [ref=e60]: "Nuestros pacientes han logrado resultados como:"
            - paragraph [ref=e61]: Hasta 91% de mejoría en osteoartrosis / artrosis
        - generic [ref=e62]:
          - generic [ref=e64]:
            - paragraph [ref=e65]: La osteoartrosis es la enfermedad reumática más frecuente en la población adulta.
            - paragraph [ref=e66]: Es una enfermedad articular crónica degenerativa con componente inflamatorio, caracterizada por degeneración y pérdida progresiva del cartílago hialino, hueso subcondral y daño del tejido sinovial, asociados con engrosamiento y esclerosis de la lámina subcondral, formación de osteofitos en el borde articular, distensión de la cápsula articular y cambios en los tejidos blandos periarticulares.
            - paragraph [ref=e67]: Por lo general, afecta a las rodillas, columna, dedos de las manos, caderas siendo menos frecuente en hombros, codos y muñecas.
          - img "Osteoartrosis - Rodilla afectada por desgaste de cartílago articular" [ref=e70]
      - generic [ref=e77]:
        - generic [ref=e78]:
          - heading "Artritis Reumatoide" [level=2] [ref=e79]
          - generic [ref=e86]:
            - paragraph [ref=e87]: "Nuestros pacientes han logrado resultados como:"
            - paragraph [ref=e88]: Hasta 67% de mejoría en artritis reumatoide
        - generic [ref=e89]:
          - generic:
            - generic:
              - img "Artritis Reumatoide - Mano con inflamación articular"
          - generic [ref=e91]:
            - paragraph [ref=e92]: La artritis reumatoide es una enfermedad inflamatoria, sistémica, de curso crónico, de causa multifactorial, origen autoinmune, cuya mayor caracterización es dolor, inflamación y daño articular con progresiva discapacidad.
            - paragraph [ref=e93]: Presenta una alta tasa de morbimortalidad que puede llevar al deterioro de la calidad de vida del individuo como paciente, a su familia y a la sociedad.
            - paragraph [ref=e94]: "Se caracteriza por una inflamación persistente de la membrana sinovial, que afecta preferentemente articulaciones periféricas, principalmente pequeñas articulaciones como: mano, muñeca y pies, lo cual conduce a la destrucción del cartílago, erosión ósea y deformidad articular."
            - paragraph [ref=e95]: También puede afectar otros órganos por lo que se considera una enfermedad sistémica.
      - generic [ref=e102]:
        - generic [ref=e103]:
          - heading "Fibromialgia" [level=2] [ref=e104]
          - generic [ref=e111]:
            - paragraph [ref=e112]: "Nuestros pacientes han logrado resultados como:"
            - paragraph [ref=e113]: Hasta 65% de mejoría en fibromialgia
        - generic [ref=e114]:
          - paragraph [ref=e117]: La fibromialgia es una enfermedad crónica caracterizada por dolor generalizado o ampliamente distribuido del aparato locomotor que se acompaña de fatiga, cansancio intenso, disminución de la capacidad funcional, alteraciones cognitivas problemas de sueño, memoria, mal estado de ánimo y síntomas funcionales en diversos órganos.
          - generic:
            - generic:
              - img "Fibromialgia - Dolor generalizado en espalda y aparato locomotor"
      - generic [ref=e124]:
        - heading "Espondiloartritis" [level=2] [ref=e126]
        - generic [ref=e133]:
          - generic:
            - generic:
              - img "Espondiloartritis - Médico especialista evaluando paciente con dolor axial"
          - generic [ref=e135]:
            - paragraph [ref=e136]: En este término se incluye un grupo heterogéneo de enfermedades inflamatorias reumáticas crónicas que afectan predominantemente al esqueleto axial, las articulaciones sacroilíacas, pudiendo afectar las articulaciones periféricas.
            - paragraph [ref=e137]: "Presentan en común:"
            - list [ref=e138]:
              - listitem [ref=e139]:
                - strong [ref=e140]: "Manifestaciones clínicas:"
                - text: La más importante es el dolor de espalda bajo de tipo inflamatorio.
              - listitem [ref=e141]:
                - strong [ref=e142]: Manifestaciones radiológicas-sacroileítis.
              - listitem [ref=e143]:
                - strong [ref=e144]: Factor genético-agregación familiar
                - text: y una fuerte asociación con el antígeno HLA B27.
              - listitem [ref=e145]:
                - strong [ref=e146]: Respuesta similar favorable
                - text: a los antinflamatorios.
            - paragraph [ref=e147]: Difieren de otros tipos de artritis, ya que involucra los sitios donde los ligamentos y tendones se unen a los huesos, llamados "entesis".
      - generic [ref=e154]:
        - heading "Reumatismos de Partes Blandas" [level=2] [ref=e156]
        - generic [ref=e163]:
          - generic [ref=e165]:
            - paragraph [ref=e166]: Los reumatismos de partes blandas son procesos dolorosos localizados que afectan a las estructuras próximas a las articulaciones, como los tendones, las bursas, los músculos o nervios.
            - paragraph [ref=e167]: Se originan generalmente por micro-traumas a repetición, como trabajos con movimientos repetitivos que pueden producir elongación, compresión e irritación de las estructuras.
            - paragraph [ref=e168]: Estas enfermedades cuando son precipitadas por traumas y no se atienden adecuadamente pueden convertirse en crónicas.
          - generic:
            - generic:
              - img "Reumatismos de Partes Blandas - Evaluación de tendones y estructuras periarticulares"
